<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>異物哽塞排除法 | EMS Academy</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .content-container { background: white; padding: 40px; border-radius: 20px; box-shadow: var(--shadow-sm); max-width: 900px; margin: 0 auto; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; color: var(--primary-blue); text-decoration: none; margin-bottom: 20px; font-weight: 600; }
        .info-card { border: 1px solid #E2E8F0; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .highlight { color: var(--primary-blue); font-weight: 700; }
    </style>
</head>
<body>
    <aside>
        <div class="sidebar-header">
            <img src="logo.png" alt="Logo" class="sidebar-logo">
            <br>
            <span>救護學院 Dashboard</span>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item">
                <i data-lucide="layout-dashboard"></i> <span>控制台</span>
            </a>
            <a href="cpr.html" class="nav-item">
                <i data-lucide="heart"></i> <span>民眾版 CPR</span>
            </a>
            <a href="choking.html" class="nav-item active">
                <i data-lucide="frown"></i> <span>異物哽塞</span>
            </a>
            <a href="bleeding.html" class="nav-item">
                <i data-lucide="droplet"></i> <span>包紮止血</span>
            </a>
        </nav>
    </aside>

    <main>
        <a href="index.html" class="back-btn"><i data-lucide="arrow-left"></i> 返回儀表板</a>
        
        <div class="content-container">
            <h1>異物哽塞排除法</h1>
            <p style="color: var(--muted-text); margin-top: 10px;">教材來源：台北市政府消防局 公版教材</p>
            <hr style="margin: 30px 0; opacity: 0.1;">

            <div class="info-card">
                <h3><i data-lucide="alert-triangle" style="color: #ECC94B;"></i> 輕度哽塞</h3>
                <p>症狀：尚能咳嗽、可以說話。<br><span class="highlight">處置：</span> 鼓勵患者用力咳嗽，絕對不要拍打背部干擾咳嗽。</p>
            </div>

            <div class="info-card" style="border-left: 5px solid var(--emergency-red);">
                <h3><i data-lucide="shield-alert" style="color: var(--emergency-red);"></i> 重度哽塞 (清醒時)</h3>
                <p>症狀：手朝喉嚨掐住、不能說話、發紺。<br><span class="highlight">處置：哈姆立克法 (Heimlich Maneuver)</span></p>
                <ul style="margin-left: 20px; margin-top: 10px;">
                    <li>施救者站在背後，雙腳弓箭步。</li>
                    <li>一手握拳置於上腹部（肚臍與胸骨尖端中間）。</li>
                    <li>另一手抱住拳頭，快速向<span class="highlight">後上方</span>推擠。</li>
                </ul>
            </div>

            <div class="info-card">
                <h3><i data-lucide="baby" style="color: var(--accent-cyan);"></i> 嬰兒哽塞處理</h3>
                <p>處置：五次背部扣擊 & 五次胸部按壓。<br>注意：不可實施腹部推擠（哈姆立克法）。</p>
            </div>
        </div>
    </main>

    <script>lucide.createIcons();</script>
</body>
</html>
