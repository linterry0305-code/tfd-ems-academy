<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMS Academy | 救護教學儀表板</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="bg-watermark"></div>

    <!-- Sidebar -->
    <aside>
        <div class="sidebar-header">
            <img src="logo.png" alt="Logo" class="sidebar-logo">
            <br>
            <span>救護學院 Dashboard</span>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item active">
                <i data-lucide="layout-dashboard"></i> <span>控制台</span>
            </a>
            <a href="#" class="nav-item">
                <i data-lucide="book-open"></i> <span>所有課程</span>
            </a>
            <a href="#" class="nav-item">
                <i data-lucide="video"></i> <span>影片專區</span>
            </a>
            <a href="#" class="nav-item">
                <i data-lucide="settings"></i> <span>系統設定</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main>
        <header class="top-bar">
            <div class="welcome-msg">
                <h1>歡迎回來，教官</h1>
                <p style="color: var(--muted-text);">今天又是守護生命的好日子。</p>
            </div>
            <div class="user-profile" style="display: flex; align-items: center; gap: 15px;">
                <span id="current-date" style="font-weight: 600;"></span>
                <i data-lucide="bell" style="cursor: pointer;"></i>
                <div style="width: 40px; height: 40px; background: #ddd; border-radius: 50%;"></div>
            </div>
        </header>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i data-lucide="library"></i></div>
                <div class="stat-info">
                    <h4>教材單元</h4>
                    <p>3 門課程</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color: var(--emergency-red); background: rgba(255,59,48,0.1);">
                    <i data-lucide="heart-pulse"></i>
                </div>
                <div class="stat-info">
                    <h4>緊急求救次數</h4>
                    <p>119</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="color: #2D3748; background: #EDF2F7;">
                    <i data-lucide="users"></i>
                </div>
                <div class="stat-info">
                    <h4>線上學習中</h4>
                    <p>Active</p>
                </div>
            </div>
        </div>

        <!-- Modules -->
        <h2 class="module-section-title">核心救護單元</h2>
        <div class="module-grid">
            
            <!-- CPR -->
            <div class="module-card" onclick="window.location.href='cpr.html'">
                <div class="module-image">💓</div>
                <div class="module-content">
                    <span class="module-badge">核心技術</span>
                    <h3>民眾版 CPR</h3>
                    <p>叫、叫、壓、電。掌握黃金救援時間 4 分鐘。</p>
                    <button class="btn-open">開啟教材</button>
                </div>
            </div>

            <!-- Choking -->
            <div class="module-card" onclick="window.location.href='choking.html'">
                <div class="module-image">✋</div>
                <div class="module-content">
                    <span class="module-badge">異物處理</span>
                    <h3>異物哽塞排除法</h3>
                    <p>哈姆立克法操作要領，成人、嬰兒、孕婦全面覆蓋。</p>
                    <button class="btn-open">開啟教材</button>
                </div>
            </div>

            <!-- Bleeding -->
            <div class="module-card" onclick="window.location.href='bleeding.html'">
                <div class="module-image">🩹</div>
                <div class="module-content">
                    <span class="module-badge">創傷處置</span>
                    <h3>包紮止血</h3>
                    <p>加壓止血、止血帶 (CAT) 使用。守護大量失血傷患。</p>
                    <button class="btn-open">開啟教材</button>
                </div>
            </div>

        </div>
    </main>

    <script>
        lucide.createIcons();
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('zh-TW', {
            year: 'numeric', month: 'long', day: 'numeric'
        });
    </script>
</body>
</html>
